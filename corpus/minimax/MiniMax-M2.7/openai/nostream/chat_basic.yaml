nd her emerald eyes reflected the flickering neon signs that painted the walls in pastel shades. Though she had been a stray since kittenhood, Sable never felt lost; every corner of the city was a map she had memorized, every scent a story waiting to be uncovered.\n\nOne damp evening, as the rain tapped a soft rhythm on the cobblestones, Sable slipped through a gap in a rusted iron fence that she had long ago noted as a secret passage. On the other side lay a hidden courtyard, a place she had heard whispered about in the midnight hush of stray cats but had never dared to enter. The courtyard was enclosed by ivy‑clad walls and illuminated by a single, ancient lamppost that seemed to pulse with a warm amber light. In the center, a small stone bench sat beside a gnarled oak tree, its branches heavy with moss‑covered lanterns that swayed gently in the breeze.\n\nSable stepped cautiously onto the mossy ground, her whiskers trembling as the scent of jasmine and old earth filled her nostrils. From the shadows of the oak, a chorus of soft chirps emerged—a family of sparrows, huddled under a cluster of leaves, chirping a lullaby to the night. The sparrows’ mother fluttered down, her feathers ruffled, and regarded Sable with a mixture of curiosity and caution.\n\n“Welcome, midnight wanderer,” the mother sparrow chirped, her voice a melodic trill. “We are the Keepers of the Garden. Few who wander in find it, and fewer still are granted a glimpse of what lies beyond its walls.”\n\nSable’s ears perked at the invitation. “What lies beyond?” she asked, her voice a low, resonant purr that seemed to harmonize with the rustle of leaves.\n\nThe mother sparrow spread her wings, revealing a tiny, shimmering feather that glowed like a star. “The Garden holds a secret—old stories that have been woven into the roots of the oak. It is said that anyone who listens can hear the echoes of the city’s heart, and those who understand its rhythm may gain a gift: the ability to soothe the restless 