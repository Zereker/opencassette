                          "text": "Milo was a small gray cat with white paws, the kind that made him look as if he had stepped carefully through a bowl of cream.\n\nHe lived in a little house at the end of Willow Lane with an old woman named Mrs. Vale, who knitted scarves in summer and baked bread in winter. Milo had many important duties: guarding the windowsill from sparrows, testing every sunbeam for warmth, and sitting on any newspaper Mrs. Vale tried to read.\n\nBut Milo\u2019s greatest secret was that every night, when the moon rose above the chimney pots, he went exploring.\n\nOne evening, the wind blew open the garden gate.\n\nMilo noticed at once. A cat notices everything, especially things humans miss. He slipped through the gap and padded into the lane, his whiskers twitching.\n\nThe world beyond the garden smelled enormous\u2014rain on stone, chimney smoke, damp leaves, and somewhere far away, fish. Milo followed the smell past the bakery, under a parked bicycle, and across the quiet square where the fountain whispered to itself.\n\nAt the edge of the square stood a tall black cat with green eyes.\n\n\u201cYou\u2019re new,\u201d she said.\n\n\u201cI am exploring,\u201d Milo replied, trying to sound braver than he felt.\n\nThe black cat flicked her tail. \u201cThen you\u2019ll want to see the moon roof.\u201d\n\nMilo had never heard of a moon roof, but he nodded as if he visited such places all the time.\n\nThe black cat led him down an alley, over a wall, across a shed, and up a slanted roof warm from the day\u2019s sunshine. From there, Milo could see the whole town: the church spire, the glowing windows, the silver ribbon of the river, and his own little house at the end of Willow Lane.\n\nThe moon hung above it all like a saucer of milk.\n\nMilo sat very still.\n\n\u201cIt\u2019s beautiful,\u201d he whispered.\n\nThe black cat smiled. \u201cEverything is bigger from the rooftops.\u201d\n\nFor a while, they watched the town sleep. Then, from far below, Milo heard a sound.\n\n\u201cMilo?\u201d called Mrs. Vale\u2019s worried voice. \u201cMilo, where are you?\u201d\n\nHis ears pricked up. Suddenly, the world seemed too big.\n\n\u201cI have to go home,\u201d he said.\n\nThe black cat nodded. \u201cGood explorers always do.\u201d\n\nMilo raced back over the shed, under the wall, across the square, past the bakery, and through the open gate. Mrs. Vale was standing in the garden in her slippers, holding a lantern.\n\nWhen Milo trotted up to her, she bent down with a sigh of relief.\n\n\u201cOh, you troublesome little wanderer,\u201d she said, scooping him into her arms.\n\nMilo purred and pressed his cold nose against her chin.\n\nThat night, he slept at the foot of Mrs. Vale\u2019s bed, dreaming of rooftops and moonlight. And although the garden gate was firmly latched from then on, Milo knew the world was still out there\u2014wide and wonderful.\n\nBut he also knew something even better.\n\nHome was the best place to return to after an adventure."
                        }
