# Azure OpenAI redaction overlay: correlation carriers Azure emits that the
# cross-vendor baseline does not know about. Loaded automatically when
# recording with --vendor azure. Values are discovered per exchange and
# rewritten to stable **TRACE_ID_n** markers across headers, URI and bodies.
#
# To cover a newly observed Azure carrier, add one line here — no code change.
trace_headers:
  - apim-request-id       # per-request correlation UUID (APIM gateway)
  - azureml-model-session # model deployment session id

# Custom replacements run on the recorded copy only, AFTER the scrubbing above
# — the live request/response are never touched. Exactly one of
# header/find/pattern per rule; `in` limits scope to header/uri/body (default:
# all). Do not mask real provenance (e.g. chatcmpl-* ids the verifier relies
# on).
replacements:
  # Azure resource hosts are internal proxy names that leak region and
  # deployment numbering (e.g. auto-eastus2-s011-d0429-...). Normalize the
  # resource label to a placeholder while keeping the vendor domain, so the
  # request URI and meta.endpoint both read as Azure OpenAI without exposing
  # the internal topology.
  - pattern: '[a-z0-9-]+\.openai\.azure\.com'
    with: "**RESOURCE**.openai.azure.com"

# More examples (commented): a whole header value, a literal, a body-only id.
#   - header: x-ms-region
#     with: "**REGION**"
#   - pattern: 'org-[a-z0-9]{24}'
#     with: "**ORG_ID**"
#     in: [body]
