# Cut a release tag — for clients whose git credentials can push commits
# but not tags (e.g. proxied CI sessions, app integrations).
#
# Two triggers:
#   - push to main touching VERSION: tags that commit with the file's
#     content (the release-file pattern; works for integrations that can
#     write files but lack actions:write to dispatch).
#   - workflow_dispatch with a tag input: for humans in the Actions UI.
#
# If the tag already exists the run skips (idempotent) rather than moving
# it; re-releasing a version requires deleting the tag first, by hand.
name: tag
on:
  push:
    branches: [main]
    paths: [VERSION]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag name to create at this ref's HEAD (e.g. v0.0.4)"
        required: true

permissions:
  contents: write

jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Resolve tag name
        id: resolve
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="$(tr -d '[:space:]' < VERSION)"
          fi
          if ! echo "$TAG" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+([-+][A-Za-z0-9.-]+)?$'; then
            echo "tag must look like vX.Y.Z (got: $TAG)" >&2
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
      - name: Create and push tag
        run: |
          TAG="${{ steps.resolve.outputs.tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git ls-remote --tags origin "refs/tags/$TAG" | grep -q .; then
            echo "tag $TAG already exists; skipping (delete it first to re-release)"
            exit 0
          fi
          git tag -a "$TAG" -m "$TAG"
          git push origin "refs/tags/$TAG"
          echo "tagged $(git rev-parse HEAD) as $TAG"
