name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test ./...
      - name: Verify corpus
        # Every cassette in the corpus must pass the authenticity/leak checks
        # on every change — FAIL findings break the build.
        run: go run ./cmd/opencassette verify corpus
