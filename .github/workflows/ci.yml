name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Gofmt
        run: test -z "$(gofmt -l .)" || { gofmt -l .; exit 1; }
      - name: Lint
        # Runs the standard set (govet, staticcheck, errcheck, …) plus wsl —
        # see .golangci.yml.
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.12.2
      - name: Test
        run: go test ./...
      - name: Verify corpus
        # Every cassette in the corpus must pass the authenticity/leak checks
        # on every change — FAIL findings break the build.
        run: go run ./cmd/opencassette verify corpus
